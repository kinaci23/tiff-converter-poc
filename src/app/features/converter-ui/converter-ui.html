<div style="font-family: Arial; max-width: 600px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
  <h2>🛠️ TIFF Dönüşüm</h2>
  
  <div style="margin-bottom: 20px;">
    <label><b>Dosya Seç (JPG/PNG/PDF):</b></label><br><br>
    <input type="file" accept="image/jpeg, image/png, application/pdf" (change)="onFileSelected($event)">
  </div>

  <div *ngIf="selectedFile" style="margin-bottom: 20px;">
    <label><b>Dönüşüm Motorunu Seç:</b></label><br><br>
    <select [(ngModel)]="selectedEngine" style="padding: 5px; font-size: 16px;">
      <option value="canvas">HTML5 Canvas</option>
      <option value="utif">UTIF.js</option>
      <option value="wasm">WASM-ImageMagick</option>
    </select>
  </div>

  <button *ngIf="selectedFile" (click)="startConversion()" [disabled]="isConverting" 
          style="padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
    {{ isConverting ? 'Dönüştürülüyor...' : 'TIFF Formatına Çevir' }}
  </button>

  <div *ngIf="conversionTime !== null" style="margin-top: 20px; padding: 15px; background-color: #d4edda; color: #155724; border-radius: 4px;">
    <p style="margin: 0;">✅ <b>İşlem Tamamlandı!</b></p>
    <p style="margin: 5px 0 0 0;">⏱ İşlem Süresi: <b>{{ conversionTime }} ms</b></p>
  </div>
</div>
